review1_text: "\"Wheel building at a level I'd been searching for in Kraków for a long time. The wheels stayed true through an entire season. I recommend it to anyone who cares about quality.\""
review1_author: "Michał K. — road cyclist"
review2_text: "\"I came in with a clear vision of a gravel bike for long-distance touring. We selected every component together. The bike went to the Balkans and came back without a single issue.\""
review2_author: "Tomasz R. — bikepacker"
review3_text: "\"Technical knowledge on a completely different level from a typical workshop. He explained why my previous setup was a mistake — and how to fix it. I've been back four times already.\""
review3_author: "Agata W. — amateur cyclist"
