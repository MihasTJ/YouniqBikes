why_quote: "\"I came in with a titanium frame, no documentation, and M5 bolts in a non-standard pattern. Other shops said no. Here they started asking for dimensions.\""
why1_title: "Knowledge without compromise"
why1_desc: "We don't pretend to be experts — we are experts. The mechanic here can explain every technical decision and why the alternative is worse."
why2_title: "Challenging projects welcome"
why2_desc: "Non-standard frames, exotic components, a bike that's been in the garage for a decade? That's exactly what we're here for."
why3_title: "Zero mass-production mindset"
why3_desc: "We don't work on a quota. Every bike gets as much attention as it needs — even if that means a longer turnaround."
why4_title: "Authenticity over marketing"
why4_desc: "We'll tell you straight if a part doesn't make sense in your build. Our goal is a bike that works — not another sale."
