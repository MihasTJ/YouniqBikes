philosophy_heading: "Rower to narzędzie i sztuka."
philosophy_p1: "Youniq Bikes to nie sieciowy punkt serwisowy. To warsztat prowadzony przez mechanika z krwi i kości – kogoś, kto wybiera komponenty tak samo świadomie jak lutier dobiera drewno do gryfu."
philosophy_p2: "Nie boimy się projektów, które inne serwisy odsyłają z kwitkiem. Wiemy, czym różni się naciąg 110 kgf od 120 kgf na szprysze i dlaczego ma to znaczenie na 200 km wyprawy. Jeśli szukasz kogoś, komu możesz zaufać stalową ramą i cyklistycznym życiem – jesteś we właściwym miejscu."
