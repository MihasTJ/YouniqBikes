philosophy_heading: "A bike is a<br><em>tool</em><br>and an art form."
philosophy_p1: "Youniq Bikes is not a chain service point. It's a workshop run by a <strong>true mechanic</strong> — someone who selects components with the same care a luthier uses when choosing wood for a neck."
philosophy_p2: "We don't shy away from projects other shops turn away. We know the difference between <strong>110 kgf and 120 kgf</strong> spoke tension — and why it matters over 200 km of riding. If you're looking for someone you can trust with your steel frame and cycling life, you're in the right place."
