review1_text: '„Zaplatanie kół na poziomie, jakiego w Krakowie długo szukałem. Koła trzymają centryczność po całym sezonie. Polecam każdemu, komu zależy na jakości."'
review1_author: 'Michał K. — kolarz szosowy'
review2_text: '„Przyszedłem z konkretną wizją gravela na długodystansowe wyprawy. Razem dobraliśmy każdy komponent. Rower pojechał na Bałkany i wrócił bez awarii."'
review2_author: 'Tomasz R. — bikepacker'
review3_text: '„Wiedza techniczna na innym poziomie niż w typowym serwisie. Wytłumaczył mi, dlaczego mój poprzedni setup był błędem – i jak to naprawić. Wróciłem tu już cztery razy."'
review3_author: 'Agata W. — cyklistka amatorska'
