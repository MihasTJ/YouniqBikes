why_quote: "„Przyszedłem z tytanową ramą bez żadnej dokumentacji i śrubami M5 w niestandardowym układzie. Inne miejsca powiedziały »nie«. Tu zaczęli pytać o wymiary.""
why1_title: "Wiedza bez kompromisów"
why1_desc: "Nie udajemy ekspertów – jesteśmy nimi. Mechanik, który tu pracuje, potrafi wyjaśnić każdą decyzję techniczną – i dlaczego alternatywa jest gorsza."
why2_title: "Trudne projekty mile widziane"
why2_desc: "Niestandardowe ramy, egzotyczne komponenty, rower po dekadzie w garażu? Właśnie po to jesteśmy."
why3_title: "Zero masówki"
why3_desc: "Nie pracujemy na akord. Każdy rower dostaje tyle uwagi, ile potrzebuje – nawet jeśli to znaczy dłuższy czas realizacji."
why4_title: "Autentyczność ponad marketing"
why4_desc: "Powiemy Ci wprost, jeśli dana część nie ma sensu w Twoim zestawieniu. Naszym celem jest rower, który działa – nie kolejna sprzedaż."
