faq1_question: 1. Czy naprawiacie tylko i wyłącznie nowoczesne rowery?
faq1_answer: Nie. Naszą pasją jest przywracanie życia klasykom. Chętnie
  podejmujemy się reanimacji 30-letnich rowerów MTB, szosówek w stylu vintage
  czy rowerów miejskich (np. marki Winora), z których inni spisali już na
  straty.
faq2_question: 2. Czy podejmujecie się napraw, których inne serwisy odmówiły?
faq2_answer: Tak. Specjalizujemy się w trudnych przypadkach – od nietypowych
  usterek w systemach SRAM (Click Box) i FOX, po niestandardowe ramy i rowery
  typu Cargo. Jeśli usłyszałeś gdzieś, że nie da się tego naprawić, przynieś
  rower do nas na Rakowicką 99.
faq3_question: 3. Jak wygląda proces wyceny? Czy koszty mnie nie zaskoczą?
faq3_answer: Działamy przejrzyście. Przy przyjęciu roweru dokonujemy wstępnej
  diagnozy i określamy przewidywane koszty. Jeśli w trakcie pracy okaże się, że
  potrzebne są dodatkowe części, konsultujemy to z Tobą przed ich zakupem.
  Rozliczamy się szczegółowo z każdej zakupionej części i wykonanej usługi.
faq4_question: 4. Czy muszę umawiać się na termin?
faq4_answer: W sezonie obłożenie bywa duże, dlatego dla większych projektów
  (budowa roweru, tuning, gruntowny przegląd) zalecamy kontakt telefoniczny.
  Drobne sprawy, jak wymiana dętki czy szybka regulacja, staramy się załatwiać
  od ręki lub w ciągu 24 godzin, o ile czas na to pozwala.
faq5_question: 5. Czy doradzacie w doborze części?
faq5_answer: Oczywiście. Nie naciągamy na najdroższe komponenty. Doradzamy
  rozwiązania adekwatne do stanu roweru i Twojego budżetu. Chętnie dzielimy się
  wiedzą – jeśli chcesz samodzielnie dbać o rower, podpowiemy Ci, jak to robić
  poprawnie.
faq6_question: 6. Dlaczego warto wybrać Youniq Bikes, a nie sieciowy serwis?
faq6_answer: Bo tutaj Twój rower nie jest kolejnym numerem w kolejce. Do każdej
  maszyny podchodzimy pedantycznie – każda śrubka jest sprawdzona, wyczyszczona
  i nasmarowana. Pracę wykonuje pasjonat-inżynier, dla którego liczy się
  bezpieczeństwo i szwajcarska precyzja działania osprzętu.
