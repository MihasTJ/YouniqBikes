backend:
  name: git-gateway
  branch: main

# Folder gdzie klient będzie wgrywał zdjęcia
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ═══════════════════════════════════════════════════
  # TREŚCI PL
  # ═══════════════════════════════════════════════════
  - name: "site"
    label: "🇵🇱 Treści strony (PL)"
    files:

      - label: "Hero (baner główny)"
        name: "hero"
        file: "_data/hero.yml"
        fields:
          - { label: "Nad-nagłówek (eyebrow)", name: "hero_eyebrow", widget: "string" }
          - { label: "Nagłówek główny", name: "hero_heading", widget: "string" }
          - { label: "Podtytuł", name: "hero_subheading", widget: "text" }
          - { label: "Przycisk główny (CTA)", name: "hero_cta_label", widget: "string" }
          - { label: "Przycisk ghost", name: "hero_cta_ghost", widget: "string" }

      - label: "Filozofia"
        name: "filozofia"
        file: "_data/filozofia.yml"
        fields:
          - { label: "Nagłówek sekcji", name: "philosophy_heading", widget: "string" }
          - { label: "Akapit 1", name: "philosophy_p1", widget: "text" }
          - { label: "Akapit 2", name: "philosophy_p2", widget: "text" }
          - { label: "Stat 1 — liczba", name: "stat1_num", widget: "string" }
          - { label: "Stat 1 — opis", name: "stat1_label", widget: "string" }
          - { label: "Stat 2 — liczba", name: "stat2_num", widget: "string" }
          - { label: "Stat 2 — opis", name: "stat2_label", widget: "string" }
          - { label: "Stat 3 — liczba", name: "stat3_num", widget: "string" }
          - { label: "Stat 3 — opis", name: "stat3_label", widget: "string" }
          - { label: "Stat 4 — liczba", name: "stat4_num", widget: "string" }
          - { label: "Stat 4 — opis", name: "stat4_label", widget: "string" }

      - label: "Dlaczego My"
        name: "dlaczego"
        file: "_data/dlaczego.yml"
        fields:
          - { label: "Cytat wiodący", name: "why_quote", widget: "text" }
          - { label: "Punkt 1 — tytuł", name: "why1_title", widget: "string" }
          - { label: "Punkt 1 — opis", name: "why1_desc", widget: "text" }
          - { label: "Punkt 2 — tytuł", name: "why2_title", widget: "string" }
          - { label: "Punkt 2 — opis", name: "why2_desc", widget: "text" }
          - { label: "Punkt 3 — tytuł", name: "why3_title", widget: "string" }
          - { label: "Punkt 3 — opis", name: "why3_desc", widget: "text" }
          - { label: "Punkt 4 — tytuł", name: "why4_title", widget: "string" }
          - { label: "Punkt 4 — opis", name: "why4_desc", widget: "text" }

      - label: "FAQ"
        name: "faq"
        file: "_data/faq.yml"
        fields:
          - { label: "Pytanie 1", name: "faq1_question", widget: "string" }
          - { label: "Odpowiedź 1", name: "faq1_answer", widget: "text" }
          - { label: "Pytanie 2", name: "faq2_question", widget: "string" }
          - { label: "Odpowiedź 2", name: "faq2_answer", widget: "text" }
          - { label: "Pytanie 3", name: "faq3_question", widget: "string" }
          - { label: "Odpowiedź 3", name: "faq3_answer", widget: "text" }
          - { label: "Pytanie 4", name: "faq4_question", widget: "string" }
          - { label: "Odpowiedź 4", name: "faq4_answer", widget: "text" }
          - { label: "Pytanie 5", name: "faq5_question", widget: "string" }
          - { label: "Odpowiedź 5", name: "faq5_answer", widget: "text" }
          - { label: "Pytanie 6", name: "faq6_question", widget: "string" }
          - { label: "Odpowiedź 6", name: "faq6_answer", widget: "text" }

      - label: "Opinie klientów"
        name: "opinie"
        file: "_data/opinie.yml"
        fields:
          - { label: "Opinia 1 — treść", name: "review1_text", widget: "text" }
          - { label: "Opinia 1 — autor", name: "review1_author", widget: "string" }
          - { label: "Opinia 2 — treść", name: "review2_text", widget: "text" }
          - { label: "Opinia 2 — autor", name: "review2_author", widget: "string" }
          - { label: "Opinia 3 — treść", name: "review3_text", widget: "text" }
          - { label: "Opinia 3 — autor", name: "review3_author", widget: "string" }

      - label: "Cennik usług"
        name: "cennik"
        file: "_data/cennik.yml"
        fields:
          - { label: "Nagłówek sekcji", name: "cennik_heading", widget: "string" }
          - { label: "Opis sekcji", name: "cennik_desc", widget: "text" }
          - { label: "Przypis / nota", name: "cennik_note", widget: "text" }

          - widget: "object"
            label: "Koła"
            name: "cat1"
            collapsed: false
            fields:
              - { label: "Tytuł kategorii", name: "cat1_title", widget: "string" }
              - { label: "Usługa 1 — nazwa", name: "price1_service", widget: "string" }
              - { label: "Usługa 1 — cena (zł)", name: "price1", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 2 — nazwa", name: "price2_service", widget: "string" }
              - { label: "Usługa 2 — cena (zł)", name: "price2", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 3 — nazwa", name: "price3_service", widget: "string" }
              - { label: "Usługa 3 — cena (zł)", name: "price3", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 4 — nazwa", name: "price4_service", widget: "string" }
              - { label: "Usługa 4 — cena (zł)", name: "price4", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 5 — nazwa", name: "price5_service", widget: "string" }
              - { label: "Usługa 5 — cena (zł)", name: "price5", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 6 — nazwa", name: "price6_service", widget: "string" }
              - { label: "Usługa 6 — cena (zł)", name: "price6", widget: "number", value_type: "int", min: 0 }

          - widget: "object"
            label: "Napęd & Hamulce"
            name: "cat2"
            collapsed: false
            fields:
              - { label: "Tytuł kategorii", name: "cat2_title", widget: "string" }
              - { label: "Usługa 7 — nazwa", name: "price7_service", widget: "string" }
              - { label: "Usługa 7 — cena (zł)", name: "price7", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 8 — nazwa", name: "price8_service", widget: "string" }
              - { label: "Usługa 8 — cena (zł)", name: "price8", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 9 — nazwa", name: "price9_service", widget: "string" }
              - { label: "Usługa 9 — cena (zł)", name: "price9", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 10 — nazwa", name: "price10_service", widget: "string" }
              - { label: "Usługa 10 — cena (zł)", name: "price10", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 11 — nazwa", name: "price11_service", widget: "string" }
              - { label: "Usługa 11 — cena (zł)", name: "price11", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 12 — nazwa", name: "price12_service", widget: "string" }
              - { label: "Usługa 12 — cena (zł)", name: "price12", widget: "number", value_type: "int", min: 0 }

          - widget: "object"
            label: "Przeglądy & Custom"
            name: "cat3"
            collapsed: false
            fields:
              - { label: "Tytuł kategorii", name: "cat3_title", widget: "string" }
              - { label: "Usługa 13 — nazwa", name: "price13_service", widget: "string" }
              - { label: "Usługa 13 — cena (zł)", name: "price13", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 14 — nazwa", name: "price14_service", widget: "string" }
              - { label: "Usługa 14 — cena (zł)", name: "price14", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 15 — konsultacja (0 = bezpłatna)", name: "price15_service", widget: "string" }
              - { label: "Usługa 15 — cena (zł, 0 = bezpłatna)", name: "price15", widget: "number", value_type: "int", min: 0 }
              - { label: "Usługa 16 — nazwa", name: "price16_service", widget: "string" }
              - { label: "Usługa 16 — stawka (zł/h)", name: "price16", widget: "number", value_type: "int", min: 0 }

      - label: "Galeria realizacji"
        name: "galeria"
        file: "_data/galeria.yml"
        fields:
          - { label: "Zdjęcie 1", name: "gallery1_img", widget: "image" }
          - { label: "Tag 1", name: "gallery1_tag", widget: "string" }
          - { label: "Opis 1", name: "gallery1_caption", widget: "string" }
          - { label: "Zdjęcie 2", name: "gallery2_img", widget: "image" }
          - { label: "Tag 2", name: "gallery2_tag", widget: "string" }
          - { label: "Opis 2", name: "gallery2_caption", widget: "string" }
          - { label: "Zdjęcie 3", name: "gallery3_img", widget: "image" }
          - { label: "Tag 3", name: "gallery3_tag", widget: "string" }
          - { label: "Opis 3", name: "gallery3_caption", widget: "string" }
          - { label: "Zdjęcie 4", name: "gallery4_img", widget: "image" }
          - { label: "Tag 4", name: "gallery4_tag", widget: "string" }
          - { label: "Opis 4", name: "gallery4_caption", widget: "string" }
          - { label: "Zdjęcie 5", name: "gallery5_img", widget: "image" }
          - { label: "Tag 5", name: "gallery5_tag", widget: "string" }
          - { label: "Opis 5", name: "gallery5_caption", widget: "string" }
          - { label: "Zdjęcie 6", name: "gallery6_img", widget: "image" }
          - { label: "Tag 6", name: "gallery6_tag", widget: "string" }
          - { label: "Opis 6", name: "gallery6_caption", widget: "string" }

      - label: "Kontakt"
        name: "kontakt"
        file: "_data/kontakt.yml"
        fields:
          - { label: "Nagłówek sekcji", name: "contact_heading", widget: "string" }
          - { label: "Opis", name: "contact_desc", widget: "text" }
          - { label: "Informacje kontaktowe", name: "contact_info", widget: "string" }

  # ═══════════════════════════════════════════════════
  # TREŚCI EN
  # ═══════════════════════════════════════════════════
  - name: "site_en"
    label: "🇬🇧 Treści strony (EN)"
    files:

      - label: "Hero (main banner)"
        name: "hero_en"
        file: "_data/hero_en.yml"
        fields:
          - { label: "Eyebrow text", name: "hero_eyebrow", widget: "string" }
          - { label: "Main heading", name: "hero_heading", widget: "string" }
          - { label: "Subheading", name: "hero_subheading", widget: "text" }
          - { label: "Primary CTA button", name: "hero_cta_label", widget: "string" }
          - { label: "Ghost button", name: "hero_cta_ghost", widget: "string" }

      - label: "Philosophy"
        name: "filozofia_en"
        file: "_data/filozofia_en.yml"
        fields:
          - { label: "Section heading", name: "philosophy_heading", widget: "string" }
          - { label: "Paragraph 1", name: "philosophy_p1", widget: "text" }
          - { label: "Paragraph 2", name: "philosophy_p2", widget: "text" }
          - { label: "Stat 1 — number", name: "stat1_num", widget: "string" }
          - { label: "Stat 1 — label", name: "stat1_label", widget: "string" }
          - { label: "Stat 2 — number", name: "stat2_num", widget: "string" }
          - { label: "Stat 2 — label", name: "stat2_label", widget: "string" }
          - { label: "Stat 3 — number", name: "stat3_num", widget: "string" }
          - { label: "Stat 3 — label", name: "stat3_label", widget: "string" }
          - { label: "Stat 4 — number", name: "stat4_num", widget: "string" }
          - { label: "Stat 4 — label", name: "stat4_label", widget: "string" }

      - label: "Why Us"
        name: "dlaczego_en"
        file: "_data/dlaczego_en.yml"
        fields:
          - { label: "Lead quote", name: "why_quote", widget: "text" }
          - { label: "Point 1 — title", name: "why1_title", widget: "string" }
          - { label: "Point 1 — description", name: "why1_desc", widget: "text" }
          - { label: "Point 2 — title", name: "why2_title", widget: "string" }
          - { label: "Point 2 — description", name: "why2_desc", widget: "text" }
          - { label: "Point 3 — title", name: "why3_title", widget: "string" }
          - { label: "Point 3 — description", name: "why3_desc", widget: "text" }
          - { label: "Point 4 — title", name: "why4_title", widget: "string" }
          - { label: "Point 4 — description", name: "why4_desc", widget: "text" }

      - label: "FAQ"
        name: "faq_en"
        file: "_data/faq_en.yml"
        fields:
          - { label: "Question 1", name: "faq1_question", widget: "string" }
          - { label: "Answer 1", name: "faq1_answer", widget: "text" }
          - { label: "Question 2", name: "faq2_question", widget: "string" }
          - { label: "Answer 2", name: "faq2_answer", widget: "text" }
          - { label: "Question 3", name: "faq3_question", widget: "string" }
          - { label: "Answer 3", name: "faq3_answer", widget: "text" }
          - { label: "Question 4", name: "faq4_question", widget: "string" }
          - { label: "Answer 4", name: "faq4_answer", widget: "text" }
          - { label: "Question 5", name: "faq5_question", widget: "string" }
          - { label: "Answer 5", name: "faq5_answer", widget: "text" }
          - { label: "Question 6", name: "faq6_question", widget: "string" }
          - { label: "Answer 6", name: "faq6_answer", widget: "text" }

      - label: "Client reviews"
        name: "opinie_en"
        file: "_data/opinie_en.yml"
        fields:
          - { label: "Review 1 — text", name: "review1_text", widget: "text" }
          - { label: "Review 1 — author", name: "review1_author", widget: "string" }
          - { label: "Review 2 — text", name: "review2_text", widget: "text" }
          - { label: "Review 2 — author", name: "review2_author", widget: "string" }
          - { label: "Review 3 — text", name: "review3_text", widget: "text" }
          - { label: "Review 3 — author", name: "review3_author", widget: "string" }

      - label: "Pricing"
        name: "cennik_en"
        file: "_data/cennik_en.yml"
        hint: "Prices are set in the 🇵🇱 Polish Pricing section and applied automatically here."
        fields:
          - { label: "Section heading", name: "cennik_heading", widget: "string" }
          - { label: "Section description", name: "cennik_desc", widget: "text" }
          - { label: "Footnote", name: "cennik_note", widget: "text" }

          - widget: "object"
            label: "Wheels"
            name: "cat1"
            collapsed: false
            fields:
              - { label: "Category title", name: "cat1_title", widget: "string" }
              - { label: "Service 1 — name", name: "price1_service", widget: "string" }
              - { label: "Service 2 — name", name: "price2_service", widget: "string" }
              - { label: "Service 3 — name", name: "price3_service", widget: "string" }
              - { label: "Service 4 — name", name: "price4_service", widget: "string" }
              - { label: "Service 5 — name", name: "price5_service", widget: "string" }
              - { label: "Service 6 — name", name: "price6_service", widget: "string" }

          - widget: "object"
            label: "Drivetrain & Brakes"
            name: "cat2"
            collapsed: false
            fields:
              - { label: "Category title", name: "cat2_title", widget: "string" }
              - { label: "Service 7 — name", name: "price7_service", widget: "string" }
              - { label: "Service 8 — name", name: "price8_service", widget: "string" }
              - { label: "Service 9 — name", name: "price9_service", widget: "string" }
              - { label: "Service 10 — name", name: "price10_service", widget: "string" }
              - { label: "Service 11 — name", name: "price11_service", widget: "string" }
              - { label: "Service 12 — name", name: "price12_service", widget: "string" }

          - widget: "object"
            label: "Service & Custom"
            name: "cat3"
            collapsed: false
            fields:
              - { label: "Category title", name: "cat3_title", widget: "string" }
              - { label: "Service 13 — name", name: "price13_service", widget: "string" }
              - { label: "Service 14 — name", name: "price14_service", widget: "string" }
              - { label: "Service 15 — name", name: "price15_service", widget: "string" }
              - { label: "Service 16 — name", name: "price16_service", widget: "string" }

      - label: "Contact"
        name: "kontakt_en"
        file: "_data/kontakt_en.yml"
        fields:
          - { label: "Section heading", name: "contact_heading", widget: "string" }
          - { label: "Description", name: "contact_desc", widget: "text" }
          - { label: "Contact info", name: "contact_info", widget: "string" }
